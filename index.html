<script>
// ── MUSIC & SOUND ENGINE (Web Audio API) ──
let audioCtx = null;
let engineNodes = {};
let musicNodes = {};

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  startBackgroundMusic();
}

// Aviator-style: pulsing electronic music loop (bass + melody + beat)
function startBackgroundMusic() {
  if (!audioCtx) return;
  stopBackgroundMusic();

  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0.28, audioCtx.currentTime);
  master.connect(audioCtx.destination);

  // === BASS LINE ===
  const bassNotes = [55, 55, 73.4, 82.4, 55, 55, 61.7, 55]; // A1, A1, D2, E2...
  const bassBeat = 0.42; // seconds per step
  let bassStep = 0;
  function playBassNote() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(bassNotes[bassStep % bassNotes.length], audioCtx.currentTime);
    env.gain.setValueAtTime(0.0, audioCtx.currentTime);
    env.gain.linearRampToValueAtTime(0.35, audioCtx.currentTime + 0.02);
    env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + bassBeat * 0.85);
    // Low-pass filter for bass warmth
    const lpf = audioCtx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.setValueAtTime(280, audioCtx.currentTime);
    osc.connect(lpf); lpf.connect(env); env.connect(master);
    osc.start(); osc.stop(audioCtx.currentTime + bassBeat);
    bassStep++;
  }

  // === MELODY (synth lead) ===
  const melodyNotes = [440, 493.88, 523.25, 587.33, 523.25, 493.88, 440, 392];
  let melStep = 0;
  const melBeat = 0.84;
  function playMelNote() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(melodyNotes[melStep % melodyNotes.length], audioCtx.currentTime);
    env.gain.setValueAtTime(0.0, audioCtx.currentTime);
    env.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.03);
    env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + melBeat * 0.7);
    // Reverb-like delay
    const delay = audioCtx.createDelay(0.3);
    delay.delayTime.setValueAtTime(0.18, audioCtx.currentTime);
    const delayGain = audioCtx.createGain();
    delayGain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    osc.connect(env); env.connect(master); env.connect(delay); delay.connect(delayGain); delayGain.connect(master);
    osc.start(); osc.stop(audioCtx.currentTime + melBeat);
    melStep++;
  }

  // === BEAT (kick + hihat) ===
  function playKick() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(160, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.12);
    env.gain.setValueAtTime(0.5, audioCtx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    osc.connect(env); env.connect(master);
    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
  }
  function playHihat() {
    if (!audioCtx) return;
    const bufSize = audioCtx.sampleRate * 0.05;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<bufSize;i++) d[i]=(Math.random()*2-1);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const hpf = audioCtx.createBiquadFilter();
    hpf.type = 'highpass';
    hpf.frequency.setValueAtTime(8000, audioCtx.currentTime);
    const env = audioCtx.createGain();
    env.gain.setValueAtTime(0.08, audioCtx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
    src.connect(hpf); hpf.connect(env); env.connect(master);
    src.start(); src.stop(audioCtx.currentTime + 0.06);
  }

  // Schedule loops
  const bassInterval = setInterval(playBassNote, bassBeat * 1000);
  const melInterval = setInterval(playMelNote, melBeat * 1000);
  let beatCount = 0;
  const beatInterval = setInterval(()=>{
    playHihat();
    if (beatCount % 2 === 0) playKick();
    beatCount++;
  }, 210);

  // Start immediately
  playBassNote(); playMelNote(); playKick();

  musicNodes = { master, bassInterval, melInterval, beatInterval };

  // pitchRamp for flight tension
  musicNodes.pitchRamp = function(mult) {
    if (!master) return;
    const g = Math.min(0.28 + (mult - 1) * 0.012, 0.45);
    master.gain.setTargetAtTime(g, audioCtx.currentTime, 0.5);
  };
}

function stopBackgroundMusic() {
  try {
    if (musicNodes.bassInterval) clearInterval(musicNodes.bassInterval);
    if (musicNodes.melInterval) clearInterval(musicNodes.melInterval);
    if (musicNodes.beatInterval) clearInterval(musicNodes.beatInterval);
  } catch(e) {}
  musicNodes = {};
}

function playCrashSound() {
  if (!audioCtx) return;
  // Crash: descending explosion sound
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(320, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(35, audioCtx.currentTime + 0.7);
  gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.9);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.9);
  // Also duck music
  if (musicNodes.master) musicNodes.master.gain.setTargetAtTime(0.08, audioCtx.currentTime, 0.2);
  setTimeout(()=>{ if (musicNodes.master) musicNodes.master.gain.setTargetAtTime(0.28, audioCtx.currentTime, 0.4); }, 1200);
}

function playCountdownBeep() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1100, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.12);
}

// ── CANVAS & GAME ──
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const multDisp=document.getElementById('multDisp');

let gs='waiting', cm=1, cp=genCrash(), gp=[], st=null, cd=5;
// Smooth plane position
let planeX=0, planeY=0, planeAngle=0;
let targetX=0, targetY=0, targetAngle=0;

function genCrash(){
  const r=Math.random();
  if(r<.5) return 1+Math.random()*.9;
  if(r<.75) return 1.9+Math.random()*2.5;
  if(r<.9) return 4.5+Math.random()*8;
  return 12+Math.random()*50;
}
function resz(){ const w=canvas.parentElement; canvas.width=w.clientWidth; canvas.height=w.clientHeight; }
resz(); window.addEventListener('resize',()=>{resz();if(gs==='waiting')drawWait();});

// ── DRAW AVIATOR PLANE (matching image: propeller plane, red, outlined style) ──
function drawAviatorPlane(x, y, angle, scale) {
  scale = scale || 1;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.scale(scale, scale);

  // Flame/trail behind engine
  const flameTime = Date.now() / 60;
  const fl = ctx.createLinearGradient(-20, 0, -70, 0);
  fl.addColorStop(0, 'rgba(255,140,0,0.9)');
  fl.addColorStop(0.4, 'rgba(255,60,0,0.5)');
  fl.addColorStop(1, 'rgba(255,20,0,0)');
  ctx.fillStyle = fl;
  ctx.beginPath();
  ctx.moveTo(-18, -4);
  ctx.lineTo(-68, Math.sin(flameTime) * 5);
  ctx.lineTo(-18, 4);
  ctx.closePath();
  ctx.fill();

  // === MAIN FUSELAGE (elongated body) ===
  ctx.fillStyle = '#cc1a1a';
  ctx.strokeStyle = '#ff3333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(32, 0);         // nose tip
  ctx.lineTo(22, -7);        // top front
  ctx.lineTo(-10, -8);       // top mid
  ctx.lineTo(-18, -5);       // top rear
  ctx.lineTo(-20, 0);        // tail join
  ctx.lineTo(-18, 5);        // bottom rear
  ctx.lineTo(-10, 8);        // bottom mid
  ctx.lineTo(22, 7);         // bottom front
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // === COCKPIT CANOPY ===
  ctx.fillStyle = 'rgba(255,100,100,0.4)';
  ctx.strokeStyle = '#ff5555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(10, -5, 10, 6, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // === TOP WING (large) ===
  ctx.fillStyle = '#bb1515';
  ctx.strokeStyle = '#ee3030';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(8, -8);         // front attach
  ctx.lineTo(14, -38);       // wing tip far
  ctx.lineTo(-5, -35);       // wing tip back
  ctx.lineTo(-12, -8);       // rear attach
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // === BOTTOM WING (large, mirrored) ===
  ctx.fillStyle = '#bb1515';
  ctx.strokeStyle = '#ee3030';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(8, 8);
  ctx.lineTo(14, 38);
  ctx.lineTo(-5, 35);
  ctx.lineTo(-12, 8);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // === TAIL FIN (vertical) ===
  ctx.fillStyle = '#aa1212';
  ctx.strokeStyle = '#dd2828';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-14, -5);
  ctx.lineTo(-26, -22);
  ctx.lineTo(-20, -8);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // === TAIL FIN BOTTOM ===
  ctx.beginPath();
  ctx.moveTo(-14, 5);
  ctx.lineTo(-26, 20);
  ctx.lineTo(-20, 8);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // === HORIZONTAL STABILIZERS ===
  ctx.fillStyle = '#aa1212';
  ctx.strokeStyle = '#dd2828';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-14, -5);
  ctx.lineTo(-22, -14);
  ctx.lineTo(-18, -5);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(-14, 5);
  ctx.lineTo(-22, 14);
  ctx.lineTo(-18, 5);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // === ENGINE / NOSE RING ===
  ctx.fillStyle = '#8b0000';
  ctx.strokeStyle = '#ff4444';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(26, 0, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // === PROPELLER ===
  const propAngle = Date.now() / 30; // fast spin
  ctx.save();
  ctx.translate(33, 0);
  ctx.rotate(propAngle);

  // Blade 1
  ctx.fillStyle = '#cc2222';
  ctx.strokeStyle = '#ff5555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(0, -13, 3.5, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Blade 2
  ctx.beginPath();
  ctx.ellipse(0, 13, 3.5, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Blade 3 (horizontal)
  ctx.beginPath();
  ctx.ellipse(-13, 0, 13, 3.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Hub
  ctx.fillStyle = '#ff2222';
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Glow outline effect
  ctx.shadowColor = '#ff2222';
  ctx.shadowBlur = 18;
  ctx.strokeStyle = 'rgba(255,50,50,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(32, 0);
  ctx.lineTo(22, -7);
  ctx.lineTo(-18, -5);
  ctx.lineTo(-20, 0);
  ctx.lineTo(-18, 5);
  ctx.lineTo(22, 7);
  ctx.closePath();
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.restore();
}

function draw(){
  const w=canvas.width, h=canvas.height;
  ctx.clearRect(0,0,w,h);
  if(gs==='waiting'){drawWait();return;}
  const pL=44,pB=36,pR=50,pT=36,gW=w-pL-pR,gH=h-pB-pT;
  if(gp.length<2) return;
  const mxM=Math.max(cm*1.12,1.6),mxT=Math.max(gp[gp.length-1].t,2);
  const tx=t=>pL+(t/mxT)*gW;
  const ty=m=>(pT+gH)-((m-1)/(mxM-1))*gH;
  ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){
    const y=pT+(i/5)*gH;
    ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(w-pR,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.font='10px Segoe UI';ctx.textAlign='right';
    ctx.fillText((mxM-(i/5)*(mxM-1)).toFixed(1)+'x',pL-4,y+4);
  }
  for(let i=0;i<=4;i++){const x=pL+(i/4)*gW;ctx.beginPath();ctx.moveTo(x,pT);ctx.lineTo(x,pT+gH);ctx.stroke();}

  // Red shaded area under graph - strong vivid red
  const gr=ctx.createLinearGradient(0,pT,0,pT+gH);
  gr.addColorStop(0,'rgba(230,57,70,.75)');
  gr.addColorStop(0.4,'rgba(200,30,50,.55)');
  gr.addColorStop(1,'rgba(180,20,40,.08)');
  ctx.fillStyle=gr;ctx.beginPath();
  ctx.moveTo(tx(gp[0].t),pT+gH);
  gp.forEach(p=>ctx.lineTo(tx(p.t),ty(p.m)));
  ctx.lineTo(tx(gp[gp.length-1].t),pT+gH);
  ctx.closePath();ctx.fill();

  // Graph line
  ctx.strokeStyle='#e63946';ctx.lineWidth=2.5;
  ctx.shadowColor='#e63946';ctx.shadowBlur=gs==='flying'?14:0;
  ctx.beginPath();
  gp.forEach((p,i)=>{i===0?ctx.moveTo(tx(p.t),ty(p.m)):ctx.lineTo(tx(p.t),ty(p.m));});
  ctx.stroke();ctx.shadowBlur=0;

  // Draw plane at graph tip (smoothed)
  if(gs==='flying'&&gp.length>=2){
    const l=gp[gp.length-1];
    const pv=gp[Math.max(0,gp.length-4)];
    targetX=tx(l.t); targetY=ty(l.m);
    targetAngle=Math.atan2(ty(l.m)-ty(pv.m), tx(l.t)-tx(pv.t));
    // Smooth interpolation
    planeX += (targetX - planeX) * 0.15;
    planeY += (targetY - planeY) * 0.15;
    planeAngle += (targetAngle - planeAngle) * 0.12;
    // Scale based on canvas size - bigger plane
    const planeScale = Math.min(w, h) / 300;
    drawAviatorPlane(planeX, planeY, planeAngle, Math.max(1.4, planeScale));
  }

  if(gs==='crashed'){ctx.fillStyle='rgba(0,0,0,.38)';ctx.fillRect(0,0,w,h);}
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pL,pT+gH);ctx.lineTo(w-pR,pT+gH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pL,pT);ctx.lineTo(pL,pT+gH);ctx.stroke();
}

function drawWait(){
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=2;ctx.setLineDash([7,5]);
  ctx.beginPath();ctx.arc(w/2,h/2,Math.min(w,h)*.26,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.font=`bold ${Math.min(20,w/18)}px Segoe UI`;ctx.textAlign='center';
  ctx.fillText('STARTING IN',w/2,h/2-8);
  ctx.font=`bold ${Math.min(42,w/9)}px Segoe UI`;ctx.fillStyle='#fff';
  ctx.fillText(Math.max(1,Math.ceil(cd))+'s',w/2,h/2+38);
}

function startGame(){
  gs='flying';cm=1;gp=[{t:0,m:1}];st=performance.now();
  planeX=0;planeY=0;planeAngle=0;
  multDisp.className='mult-disp';
  initAudio();
  requestAnimationFrame(loop);
}

function loop(ts){
  if(gs!=='flying') return;
  const e=(ts-st)/1000;
  // Slower growth: use 0.4 exponent instead of 0.6 for smoother/slower flight
  cm=Math.pow(Math.E, e * 0.42);
  gp.push({t:e,m:cm});
  multDisp.textContent=cm.toFixed(2)+'x';
  if(musicNodes.pitchRamp) musicNodes.pitchRamp(cm);
  if(cm>=cp){doCrash();return;}
  draw();
  requestAnimationFrame(loop);
}

function doCrash(){
  gs='crashed';
  multDisp.className='mult-disp crashed';
  playCrashSound();
  const cl=cm>=10?'mp-hi':cm>=3?'mp-mi':'mp-lo';
  pastM.unshift({v:parseFloat(cm.toFixed(2)),c:cl});
  if(pastM.length>20) pastM.pop();
  buildBar(); draw();
  setTimeout(startCountdown,2200);
}

let lastCd=6;
function startCountdown(){
  gs='waiting';cd=5;cp=genCrash();multDisp.textContent='';lastCd=6;
  const iv=setInterval(()=>{
    cd-=.1;
    const cur=Math.ceil(cd);
    if(cur<lastCd && cur>0){ playCountdownBeep(); lastCd=cur; }
    drawWait();
    if(cd<=0){clearInterval(iv);startGame();}
  },100);
}
